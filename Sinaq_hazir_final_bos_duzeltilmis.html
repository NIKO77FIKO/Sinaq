/** ====== PARAMETRL∆ŹR ====== */
const QUESTION_COUNT = 25;
const TIME_LIMIT = 30 * 60; // saniy…ô
const SCORE_CORRECT = 2;
const SCORE_WRONG = -1;

/** ====== STATE ====== */
let TIME = TIME_LIMIT;
let interval = null;
let started = false;

let baseScore = 0;             // giriŇü balńĪ
let quizQuestions = [];        // se√ßilmiŇü 25 sual (Ňüaffl edilmiŇü)
let answers = new Map();       // idx -> se√ßil…ôn variant (A/B/C/D)

/** ====== UTIL ====== */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function formatTime(sec) {
  const m = String(Math.floor(sec / 60)).padStart(2, "0");
  const s = String(sec % 60).padStart(2, "0");
  return `${m}:${s}`;
}

function decodeHTML(str) {
  // &lt; &gt; &quot; kimi entity-l…ôri real simvola √ßevirir
  const t = document.createElement("textarea");
  t.innerHTML = str;
  return t.value;
}

function safeSetText(el, str) {
  el.textContent = decodeHTML(str);
}

/** ====== QUIZ HAZIRLA ====== */
function pickNewQuiz() {
  const pool = ALL_QUESTIONS.slice();
  shuffle(pool);
  const picked = pool.slice(0, Math.min(QUESTION_COUNT, pool.length));

  // h…ôr sualda variantlarńĪ qarńĪŇüdńĪr v…ô correct h…ôrfini yenil…ô
  quizQuestions = picked.map((q) => {
    const entries = Object.entries(q.options); // [ ["A","..."], ... ]
    shuffle(entries);

    const newOptions = {};
    const letters = ["A","B","C","D"];
    let newCorrect = null;

    entries.forEach(([oldKey, val], idx) => {
      const newKey = letters[idx];
      newOptions[newKey] = val;
      if (oldKey === q.correct) newCorrect = newKey;
    });

    return {
      q: q.q,
      options: newOptions,
      correct: newCorrect
    };
  });

  answers = new Map();
  renderQuiz();
  updateProgress();
  document.getElementById("result").innerHTML = "";
}

function renderQuiz() {
  const quiz = document.getElementById("quiz");
  quiz.innerHTML = "";

  quizQuestions.forEach((q, idx) => {
    const block = document.createElement("div");
    block.className = "question-block";
    block.dataset.index = String(idx);

    const title = document.createElement("div");
    title.className = "q-title";
    safeSetText(title, q.q);

    block.appendChild(title);

    const letters = Object.keys(q.options);
    letters.forEach((key) => {
      const label = document.createElement("label");
      label.className = "option";

      const input = document.createElement("input");
      input.type = "radio";
      input.name = `q_${idx}`;
      input.value = key;

      input.addEventListener("change", () => {
        answers.set(idx, key);
        updateProgress();
      });

      const span = document.createElement("span");
      // variantlar artńĪq &lt;...&gt; kimidir, ona g√∂r…ô innerHTML il…ô g√∂st…ôririk
      span.innerHTML = `<b>${key})</b> `;
      span.appendChild(document.createTextNode(decodeHTML(q.options[key])));

      label.appendChild(input);
      label.appendChild(span);
      block.appendChild(label);
    });

    // "BoŇü" (cavab verm…ôm…ôk) variantńĪ
    // Se√ßil…ônd…ô cavabńĪ silirik ki, sistem bunu "boŇü" kimi saysńĪn.
    {
      const label = document.createElement("label");
      label.className = "option";

      const input = document.createElement("input");
      input.type = "radio";
      input.name = `q_${idx}`;
      input.value = "__SKIP__";

      input.addEventListener("change", () => {
        answers.delete(idx);
        updateProgress();
      });

      const span = document.createElement("span");
      span.innerHTML = `<b>E)</b> `;
      span.appendChild(document.createTextNode("BoŇü (cavab yoxdur)"));

      label.appendChild(input);
      label.appendChild(span);
      block.appendChild(label);
    }

    quiz.appendChild(block);
  });

  document.getElementById("finishBtn").style.display = "block";
}

/** ====== TIMER ====== */
function startTimer() {
  if (interval) clearInterval(interval);
  interval = setInterval(() => {
    TIME--;
    document.getElementById("timer").textContent = "Qalan vaxt: " + formatTime(Math.max(TIME, 0));
    if (TIME <= 0) {
      clearInterval(interval);
      finish(true);
    }
  }, 1000);
}

function resetTimer() {
  TIME = TIME_LIMIT;
  document.getElementById("timer").textContent = "Qalan vaxt: " + formatTime(TIME);
}

/** ====== PROGRESS ====== */
function calculateStats() {
  let correct = 0, wrong = 0, skipped = 0;

  quizQuestions.forEach((q, idx) => {
    const sel = answers.get(idx);
    if (!sel) {
      skipped++;
    } else if (sel === q.correct) {
      correct++;
    } else {
      wrong++;
    }
  });

  return { correct, wrong, skipped };
}

function updateProgress() {
  const { correct, wrong, skipped } = calculateStats();
  const answered = correct + wrong;

  document.getElementById("progressText").textContent = `Cavablanan: ${answered} / ${quizQuestions.length}`;
  document.getElementById("okCount").textContent = String(correct);
  document.getElementById("noCount").textContent = String(wrong);
  document.getElementById("skipCount").textContent = String(skipped);

  const pct = quizQuestions.length ? (answered / quizQuestions.length) * 100 : 0;
  document.getElementById("barFill").style.width = pct.toFixed(1) + "%";
}

/** ====== FINISH ====== */
function finish(auto=false) {
  // bir d…ôf…ô bitirsin
  document.getElementById("finishBtn").disabled = true;
  if (interval) clearInterval(interval);

  const { correct, wrong, skipped } = calculateStats();
  const examScore = correct * SCORE_CORRECT + wrong * SCORE_WRONG;
  const score = baseScore + correct * SCORE_CORRECT + wrong * SCORE_WRONG;

  // bloklarńĪ r…ôngl…ô
  const blocks = document.querySelectorAll(".question-block");
  blocks.forEach((block) => {
    const idx = Number(block.dataset.index);
    const q = quizQuestions[idx];
    const sel = answers.get(idx);

    block.classList.remove("correct-ans", "wrong-ans", "skipped-ans");

    if (!sel) block.classList.add("skipped-ans");
    else if (sel === q.correct) block.classList.add("correct-ans");
    else block.classList.add("wrong-ans");

    // dońüru cavabńĪ yaz
    const info = document.createElement("div");
    info.style.marginTop = "10px";

    const badge = document.createElement("span");
    badge.className = "badge " + (!sel ? "b-skip" : (sel === q.correct ? "b-ok" : "b-no"));
    badge.textContent = !sel ? "BOŇě" : (sel === q.correct ? "D√úZ" : "S∆ŹHV");

    const text = document.createElement("span");
    text.className = "muted";
    text.style.marginLeft = "8px";
    const selTxt = sel ? sel : "-";
    text.innerHTML = `S…ônin cavabńĪn: <b>${selTxt}</b> ¬∑ D√ľzg√ľn cavab: <b>${q.correct}</b>`;

    info.appendChild(badge);
    info.appendChild(text);

    // eyni sualda t…ôkrar finish etm…ôsin dey…ô …ôvv…ôlki info-larńĪ sil
    const old = block.querySelector(".muted")?.parentElement;
    if (old && old.parentElement === block && old !== info) {
      // nothing
    }
    // remove previous info blocks if exists
    [...block.querySelectorAll("div")].forEach(d => {
      if (d !== block.firstChild && d.className === "" && d.querySelector(".badge")) d.remove();
    });
    block.appendChild(info);
  });

  const result = document.getElementById("result");
  result.innerHTML = `
    <hr />
    <h3>N…ôtic…ô</h3>
    <div class="row">
      <div><b>D√ľz:</b> ${correct} (x${SCORE_CORRECT})</div>
      <div><b>S…ôhv:</b> ${wrong} (x${SCORE_WRONG})</div>
      <div><b>BoŇü:</b> ${skipped}</div>
    </div>
    <p><b>SńĪnaq balńĪ:</b> ${examScore}</p>
    <p><b>GiriŇü balńĪ:</b> ${baseScore}</p>
    <p style="font-size: 18px;"><b>Yekun bal:</b> ${score}</p>
    <button type="button" onclick="location.reload()">Yenid…ôn baŇüla</button>
  `;

  if (auto) {
    const warn = document.createElement("p");
    warn.style.color = "#c0392b";
    warn.innerHTML = "<b>Vaxt bitdi!</b> ńįmtahan avtomatik tamamlandńĪ.";
    result.prepend(warn);
  }
}

/** ====== START ====== */
function askBaseScore() {
  const raw = prompt("ńįmtahana giriŇü balńĪ (0-50). BoŇü buraxsan 0 olacaq:", "0");
  const val = Number(raw);
  if (Number.isFinite(val) && val >= 0 && val <= 50) return Math.floor(val);
  return 0;
}

function start() {
  if (started) return;
  started = true;

  baseScore = askBaseScore();
  resetTimer();
  pickNewQuiz();
  startTimer();

  document.getElementById("finishBtn").addEventListener("click", () => finish(false));
  document.getElementById("regenBtn").addEventListener("click", () => {
    if (confirm("Yeni 25 sual se√ßilsin? (m√∂vcud cavablar silin…ôc…ôk)")) {
      document.getElementById("finishBtn").disabled = false;
      resetTimer();
      startTimer();
      pickNewQuiz();
    }
  });
  document.getElementById("clearBtn").addEventListener("click", () => {
    if (confirm("B√ľt√ľn cavablar silinsin?")) {
      answers = new Map();
      document.querySelectorAll('input[type="radio"]').forEach(i => i.checked = false);
      updateProgress();
      document.getElementById("result").innerHTML = "";
      document.getElementById("finishBtn").disabled = false;
    }
  });
}

document.addEventListener("DOMContentLoaded", start);

function toggleTheme(){
  document.body.classList.toggle("dark");
  if(document.body.classList.contains("dark")){
    localStorage.setItem("theme","dark");
  } else {
    localStorage.setItem("theme","light");
  }
}

window.addEventListener("load", function(){
  if(localStorage.getItem("theme")==="dark"){
    document.body.classList.add("dark");
  }
});
